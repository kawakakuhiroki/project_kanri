
<!DOCTYPE html>

</head>
<body>
  <div class="container">

  <div class="nav">
    <div>
      <div class="nav-title">プロジェクト管理システム</div>
      <div class="small user-badge">ログインID：admin　氏名：管理 太郎</div>
    </div>
    <div class="tabs">
      <a class="tab" href="#">プロジェクト一覧</a> <a class="tab" href="#">かんばん</a> <a class="tab" href="#">カレンダー</a> <a class="tab" href="#">レポート</a> <a class="tab" href="#">予実管理</a> <a class="tab" href="#">フォーラム</a> <a class="tab" href="#">ドキュメント</a> <a class="tab active" href="#">不具合</a> <a class="tab" href="#">承認</a> <a class="tab" href="#">Wiki</a> <a class="tab" href="#">管理</a> <a class="tab" href="#">ログアウト</a>
    </div>

<div class="card">
  <div class="h1">不具合管理</div>
  <div class="muted">バグ/不具合の登録と進捗管理を行います。</div>

  <div id="issuesError" class="inline-error"></div>

  <div class="issue-form">
    <div class="field">
      <label>タイトル</label>
      <input type="text" id="issueTitle" value="画面遷移で白画面になる" />
    </div>
    <div class="field">
      <label>詳細</label>
      <input type="text" id="issueDesc" value="特定手順で再現" />
    </div>
    <div class="field">
      <label>優先度</label>
      <select id="issuePriority">
        <option value="1">最高</option>
        <option value="2">高</option>
        <option value="3" selected>中</option>
        <option value="4">低</option>
        <option value="5">最低</option>
      </select>
    </div>
    <div class="field">
      <label>重要度</label>
      <select id="issueSeverity">
        <option value="CRITICAL">致命的</option>
        <option value="HIGH">高</option>
        <option value="MEDIUM" selected>中</option>
        <option value="LOW">低</option>
      </select>
    </div>
    <div class="row" style="margin-top: 12px;">
      <button id="createIssueBtn">登録</button>
    </div>
  </div>

  <div class="table-scroll" style="margin-top: 12px;">
    <table class="issues-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>タイトル</th>
          <th>ステータス</th>
          <th>優先度</th>
          <th>重要度</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="issuesBody"></tbody>
    </table>
  </div>
</div>

  </div>

<script src="../fixtures.js"></script>

</body>
